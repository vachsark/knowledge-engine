# Full config for continuous learning with scheduled sessions
# Copy to ke.yaml in your project root

knowledge_dir: ./knowledge

# Use Sonnet for synthesis (high quality), local for retrieval/reranking
default_model: sonnet
local_model: qwen3:8b
embed_model: qwen3-embedding:0.6b
rerank_model: qwen3:8b

# Strict quality gate for production-quality knowledge
backpressure_min_delta: 0.005
gate_pass_threshold: 0.72
gate_max_bounces: 3

# Lesson tracking
max_lessons: 50
staleness_window: 10

# Daily token budget (500k ≈ 10-15 research sessions with Sonnet)
token_budget_daily: 500000
